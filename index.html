<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Inter:wght@400;500&family=Londrina+Solid:wght@400;900&family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { overflow: hidden; height: 100%; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f3ede4; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }
        .center { flex: 1; display: flex; align-items: center; justify-content: center; }
        .center > div { text-align: center; position: relative; }
        .logo { font-family: 'Londrina Solid', sans-serif; font-size: clamp(80px, 20vw, 252px); letter-spacing: 2px; color: #e8432a; padding: 0 16px; line-height: 1; margin-bottom: 0; cursor: default; }
        .logo span { display: inline-block; transition: all 0.3s ease; }
        .logo span.glitching {
            animation: glitch 0.8s steps(1) 1;
        }
        .logo span.pixelated {
            filter: url(#pixelate);
            text-shadow:
                clamp(2px, 0.3vw, 4px) 0 0 #1a1a1a,
                clamp(-2px, -0.3vw, -4px) 0 0 #1a1a1a,
                0 clamp(2px, 0.3vw, 4px) 0 #1a1a1a,
                0 clamp(-2px, -0.3vw, -4px) 0 #1a1a1a,
                clamp(2px, 0.3vw, 4px) clamp(2px, 0.3vw, 4px) 0 #1a1a1a,
                clamp(-2px, -0.3vw, -4px) clamp(-2px, -0.3vw, -4px) 0 #1a1a1a,
                clamp(2px, 0.3vw, 4px) clamp(-2px, -0.3vw, -4px) 0 #1a1a1a,
                clamp(-2px, -0.3vw, -4px) clamp(2px, 0.3vw, 4px) 0 #1a1a1a;
        }
        @keyframes glitch {
            0% { opacity: 1; text-shadow: 4px 0 #ff0000, -4px 0 #00ffff; transform: translate(0); }
            10% { opacity: 0; }
            15% { opacity: 1; text-shadow: -3px 0 #ff0000, 3px 0 #00ffff; transform: translate(5px, -2px) skewX(5deg); }
            20% { opacity: 0; }
            25% { opacity: 1; transform: translate(-4px, 1px) skewX(-3deg); }
            35% { text-shadow: 3px 0 #ff0000, -3px 0 #00ffff; transform: translate(2px, -3px); }
            40% { opacity: 0; }
            45% { opacity: 1; transform: translate(-3px, 2px) skewX(4deg); }
            55% { text-shadow: -4px 0 #ff0000, 4px 0 #00ffff; }
            60% { opacity: 0; }
            65% { opacity: 1; transform: translate(3px, -1px) skewX(-2deg); }
            75% { text-shadow: 2px 0 #ff0000, -2px 0 #00ffff; transform: translate(-2px, 2px); }
            85% { opacity: 0; }
            90% { opacity: 1; transform: translate(0); }
            100% { opacity: 1; text-shadow: none; transform: translate(0); }
        }
        .tagline { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; font-size: clamp(22px, 4vw, 40px); color: rgba(0,0,0,0.4); letter-spacing: 1px; }
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; }
        .nav-logo { font-family: 'Londrina Solid', sans-serif; font-size: 22px; color: #e8432a; text-decoration: none; }
        .nav-links a { color: rgba(0,0,0,0.4); text-decoration: none; font-size: 14px; margin-left: 24px; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; }
        .nav-links a:hover { color: #1a1a1a; }
        .copyright { color: rgba(0,0,0,0.2); font-size: 11px; margin-top: 16px; }
        .cat-graphics { position: absolute; pointer-events: none; }
        .paw { position: absolute; font-size: clamp(24px, 4vw, 48px); opacity: 0.12; }
        .scratch { position: fixed; pointer-events: none; opacity: 0.08; }
        .scratch::before { content: ''; display: block; width: clamp(30px, 5vw, 60px); height: clamp(50px, 8vw, 100px); background: repeating-linear-gradient(10deg, transparent, transparent 3px, #1a1a1a 3px, #1a1a1a 5px, transparent 5px, transparent 8px); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="center">
        <div>
            <h1 class="logo"><span>P</span><span>R</span><span>E</span><span style="display:inline-block;width:0.15em"></span><span>P</span><span>U</span><span>R</span><span>R</span></h1>
            <p class="tagline">Making test prep easy</p>

        </div>
    </div>
    <script>
    (function() {
        const spans = document.querySelectorAll('.logo span');
        const letterSpans = Array.from(spans).filter(s => s.textContent.trim().length > 0);
        let timeouts = [];

        function clearAll() {
            timeouts.forEach(t => clearTimeout(t));
            timeouts = [];
            letterSpans.forEach(s => {
                s.classList.remove('pixelated', 'glitching');
            });
        }

        let active = false;

        function pixelateWithGlitch(span) {
            if (!active) return;
            span.classList.add('glitching');
            const t = setTimeout(() => {
                if (!active) { span.classList.remove('glitching'); return; }
                span.classList.remove('glitching');
                span.classList.add('pixelated');
            }, 800);
            timeouts.push(t);
        }

        letterSpans.forEach((span, idx) => {
            span.addEventListener('mouseenter', () => {
                clearAll();
                active = true;
                pixelateWithGlitch(span);

                for (let dist = 1; dist <= letterSpans.length; dist++) {
                    const left = letterSpans[idx - dist];
                    const right = letterSpans[idx + dist];
                    const delay = dist * 250;

                    if (left) {
                        const t = setTimeout(() => pixelateWithGlitch(left), delay);
                        timeouts.push(t);
                    }
                    if (right) {
                        const t = setTimeout(() => pixelateWithGlitch(right), delay);
                        timeouts.push(t);
                    }
                }
            });
        });

        document.querySelector('.logo').addEventListener('mouseleave', () => {
            active = false;
            clearAll();
        });
    })();
    </script>
    <canvas id="cat" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;image-rendering:pixelated;"></canvas>


<script>
(function() {
    const canvas = document.getElementById('cat');
    const ctx = canvas.getContext('2d');
    const S = 5;
    const W = 15, H = 11;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const baseSprites = {
        walk1: [
            '.BB..BB........',
            'BOOBBOOB.......',
            'BOOOOOOB.......',
            'BOBOOBOOB......',
            'BOOOPOOOB......',
            'BOOOOOOOOOB....',
            'BOOODDDOOBBB...',
            '.BOODDDDBBDOB..',
            '.BOOOOOOB.BOB..',
            '..BBBBBB..BB...',
            '..BOB.BOB......',
        ],
        walk2: [
            '.BB..BB........',
            'BOOBBOOB.......',
            'BOOOOOOB.......',
            'BOBOOBOOB......',
            'BOOOPOOOB......',
            'BOOOOOOOOOB....',
            'BOOODDDOOBBB...',
            '.BOODDDDBBDOB..',
            '.BOOOOOOB.BOB..',
            '..BBBBBB..BB...',
            '...BOB.BOB.....',
        ],
        annoyed: [
            '.BB..BB........',
            'BOOBBOOB.......',
            'BOOOOOOB.......',
            'BBBOOBBOB......',
            'BOOOPOOOB......',
            'BOOOOOOOOOB....',
            'BOOODDDOOBBB...',
            '.BOODDDDBBDOB..',
            '.BOOOOOOB.BOB..',
            '..BBBBBB..BB...',
            '..BOB.BOB......',
        ],
        blink: [
            '.BB..BB........',
            'BOOBBOOB.......',
            'BOOOOOOB.......',
            'OBBOOBBOB......',
            'BOOOPOOOB......',
            'BOOOOOOOOOB....',
            'BOOODDDOOBBB...',
            '.BOODDDDBBDOB..',
            '.BOOOOOOB.BOB..',
            '..BBBBBB..BB...',
            '...............',
        ],
        falling: [
            '.BB..BB........',
            'BOOBBOOB.......',
            'BOOOOOOB.......',
            'BOBOOBOOB......',
            'BOOOPOOOB......',
            'BOOBOBOOOB.....',
            'BOOODDDOOBBB...',
            '.BOODDDDBBDOB..',
            '.BOOOOOOB.BOB..',
            '..BBBBBB..BB...',
            '..BOB.BOB......',
        ],
        scratching: [
            'BOB.BOB........',
            'BOB.BOB........',
            'BOB.BOB........',
            'BOOBBOOB.......',
            'BOOOOOOB.......',
            'BOBOOBOOB......',
            'BOOOPOOOB......',
            'BOOOOOOOOOB....',
            'BOOODDDOOBBB...',
            '.BOODDDDBBDOB..',
            '.BOOOOOOB.BOB..',
            '..BBBBBB..BB...',
            '..BOB.BOB......',
            '..BOB.BOB......',
        ],
    };

    const palettes = [
        { O: '#e8932a', D: '#c47420', P: '#ffaabb', name: 'orange' },
        { O: '#aaaaaa', D: '#888888', P: '#ffaabb', name: 'grey' },
        { O: '#3a3a3a', D: '#222222', P: '#ff8899', name: 'black' },
        { O: '#f0e6d0', D: '#d4c4a8', P: '#ffaabb', name: 'cream' },
        { O: '#d4844a', D: '#a86030', P: '#ffaabb', name: 'ginger' },
    ];

    const accessories = [
        { name: 'none', draw: function(){} },
        { name: 'shades', draw: function(x, y, flip, S) {
            const sx = flip ? x + 7*S : x + 3*S;
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(sx, y + 3*S, 3*S, S);
            ctx.fillRect(sx + 1*S, y + 4*S, 2*S, S);
            ctx.fillRect(sx + 2*S, y + 5*S, S, S);
            ctx.fillRect(sx + 4*S, y + 3*S, 3*S, S);
            ctx.fillRect(sx + 5*S, y + 4*S, 2*S, S);
            ctx.fillRect(sx + 6*S, y + 5*S, S, S);
            ctx.fillRect(sx + 3*S, y + 3*S, S, S);
        }},
        { name: 'hat', draw: function(x, y, flip, S) {
            const sx = flip ? x + (W-8)*S : x;
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(sx, y - S, 8*S, S);
            ctx.fillRect(sx + 2*S, y - 3*S, 4*S, 2*S);
        }},
        { name: 'bowtie', draw: function(x, y, flip, S) {
            const sx = flip ? x + (W-4)*S : x + 3*S;
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(sx, y + 5*S, S, S);
            ctx.fillRect(sx - S, y + 4.5*S, S, 2*S);
            ctx.fillRect(sx + S, y + 4.5*S, S, 2*S);
        }},
        { name: 'crown', draw: function(x, y, flip, S) {
            const sx = flip ? x + (W-7)*S : x + 1*S;
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(sx, y - S, 6*S, S);
            ctx.fillRect(sx, y - 2*S, S, S);
            ctx.fillRect(sx + 2.5*S, y - 2*S, S, S);
            ctx.fillRect(sx + 5*S, y - 2*S, S, S);
        }},
    ];

    let scratchMarks = [];

    function drawScratchMarks() {
        scratchMarks.forEach(mark => {
            ctx.strokeStyle = 'rgba(0,0,0,' + mark.opacity + ')';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(mark.x + i * 6, mark.y1);
                ctx.lineTo(mark.x + i * 6 + 2, mark.y2);
                ctx.stroke();
            }
        });
        scratchMarks = scratchMarks.filter(m => { m.opacity -= 0.0008; return m.opacity > 0; });
    }

    function drawSprite(sprite, x, y, flip, palette) {
        const colors = { 'B': '#1a1a1a', 'O': palette.O, 'D': palette.D, 'P': palette.P };
        for (let row = 0; row < sprite.length; row++) {
            for (let col = 0; col < sprite[row].length; col++) {
                const ch = sprite[row][col];
                if (ch === '.') continue;
                const px = flip ? x + (sprite[row].length - 1 - col) * S : x + col * S;
                ctx.fillStyle = colors[ch] || '#1a1a1a';
                ctx.fillRect(px, y + row * S, S, S);
            }
        }
    }

    class Cat {
        constructor(x, paletteIdx, accessoryIdx, speed) {
            this.x = x;
            this.y = 0;
            this.palette = palettes[paletteIdx];
            this.accessory = accessories[accessoryIdx];
            this.direction = Math.random() > 0.5 ? 1 : -1;
            this.speed = speed;
            this.frame = Math.floor(Math.random() * 200);
            this.state = 'walking';
            this.velY = 0;
            this.annoyedTimer = 0;
            this.blinkTimer = 0;
            this.offsetX = 0;
            this.offsetY = 0;
        }
        getGroundY() { return window.innerHeight - H * S; }
        init() { this.y = this.getGroundY(); }
        update() {
            const groundY = this.getGroundY();
            if (this.state === 'walking') {
                this.x += this.speed * this.direction;
                if (this.x > canvas.width - W*S) this.direction = -1;
                if (this.x < 10) this.direction = 1;
                this.frame++;
                const isBlink = Math.floor(this.frame / 8) % 40 === 0;
                const spr = isBlink ? baseSprites.blink : (Math.floor(this.frame / 12) % 2 === 0 ? baseSprites.walk1 : baseSprites.walk2);
                drawSprite(spr, this.x, this.y, this.direction === 1, this.palette);
                this.accessory.draw(this.x, this.y, this.direction === 1, S);
            } else if (this.state === 'annoyed') {
                drawSprite(baseSprites.annoyed, this.x, this.y, this.direction === 1, this.palette);
                this.accessory.draw(this.x, this.y, this.direction === 1, S);
                this.annoyedTimer--;
                if (this.annoyedTimer <= 0) this.state = 'walking';
            } else if (this.state === 'held') {
                this.blinkTimer++;
                const spr = Math.floor(this.blinkTimer / 20) % 3 === 0 ? baseSprites.blink : baseSprites.falling;
                drawSprite(spr, this.x, this.y, false, this.palette);
                this.accessory.draw(this.x, this.y, false, S);
            } else if (this.state === 'falling') {
                const slideSpeed = 2.5;
                const prevY = this.y;
                this.y += slideSpeed;
                drawSprite(baseSprites.scratching, this.x, this.y, false, this.palette);
                this.accessory.draw(this.x, this.y + 3*S, false, S);
                scratchMarks.push({ x: this.x + 1*S, y1: prevY + 2*S, y2: this.y + 2*S, opacity: 0.12 });
                if (this.y >= groundY) {
                    this.y = groundY;
                    this.state = 'bouncing';
                    this.velY = -10;
                }
            } else if (this.state === 'bouncing') {
                this.velY += 1.2;
                this.y += this.velY;
                drawSprite(baseSprites.falling, this.x, this.y, false, this.palette);
                this.accessory.draw(this.x, this.y, false, S);
                if (this.y >= groundY) {
                    this.y = groundY;
                    if (Math.abs(this.velY) > 2) {
                        this.velY = -this.velY * 0.3;
                    } else {
                        this.velY = 0;
                        this.state = 'annoyed';
                        this.annoyedTimer = 60;
                    }
                }
            }
        }
        hitTest(px, py) {
            return px >= this.x && px <= this.x + W*S && py >= this.y && py <= this.y + H*S;
        }
    }

    const cats = [
        new Cat(80, 0, 0, 0.4),
        new Cat(300, 1, 1, 0.55),
        new Cat(500, 4, 2, 0.35),
        new Cat(200, 3, 3, 0.5),
        new Cat(650, 2, 4, 0.45),
    ];
    cats.forEach(c => c.init());

    let dragCat = null;

    function tick() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawScratchMarks();
        cats.forEach(c => c.update());
        requestAnimationFrame(tick);
    }

    function getPos(e) {
        if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    canvas.style.pointerEvents = 'none';
    document.addEventListener('mousedown', startDrag);
    document.addEventListener('touchstart', startDrag, { passive: false });

    function startDrag(e) {
        const pos = getPos(e);
        for (let i = cats.length - 1; i >= 0; i--) {
            if (cats[i].hitTest(pos.x, pos.y)) {
                e.preventDefault();
                dragCat = cats[i];
                dragCat.state = 'held';
                dragCat.blinkTimer = 0;
                dragCat.offsetX = dragCat.x - pos.x;
                dragCat.offsetY = dragCat.y - pos.y;
                document.addEventListener('mousemove', onDrag);
                document.addEventListener('touchmove', onDrag, { passive: false });
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
                return;
            }
        }
    }

    function onDrag(e) {
        if (!dragCat) return;
        e.preventDefault();
        const pos = getPos(e);
        dragCat.x = pos.x + dragCat.offsetX;
        dragCat.y = pos.y + dragCat.offsetY;
    }

    function endDrag() {
        if (!dragCat) return;
        dragCat.state = 'falling';
        dragCat.velY = 0;
        dragCat = null;
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('touchmove', onDrag);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchend', endDrag);
    }

    tick();
})();
</script>
